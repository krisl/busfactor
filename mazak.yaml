protocol: eip
address: 127.0.0.1
#address: 192.168.10.1
interval: 0.1               # 100 ms for fast I/O
#output_assembly: 150
output_assembly: 100
#input_assembly: 100
input_assembly: 101
input_size: 110
#input_size: 76
output_size: 110
#output_size: 76
rpi_ms: 100
field_vars:
  EIP.Input:
    base_register: 18178
    register_width_bits: 16
    fields:
      - 18178:
          - Bit0.0:DO 000 - heartbeat
          - Bit0.1:DO 001 - machine_ready
          - Bit0.2:DO 002 - robot stop request
          - Bit0.3:DO 003 - panel retracted
          - Bit0.4:DO 004 - alarm
          - Bit0.6:DO 006 - power off req ack
          #- Bit1.0:DO 008 - fix1 clamp complete
          #- Bit1.1:DO 009 - fix1 unclamp complete
          #- Bit1.2:DO 010 - fix2 clamp complete
          #- Bit1.3:DO 011 - fix2 unclamp complete
          #- Bit1.4:DO 012 - fix3 clamp complete
          #- Bit1.5:DO 013 - fix3 unclamp complete
          #- Bit1.6:DO 014 - fix4 clamp complete
          #- Bit1.7:DO 015 - fix4 unclamp complete
      #- 18179:
      #    - Bit0.0:DO 016 - Seat detect complete 1
      #    - Bit0.1:DO 017 - Seat detect complete 2
      #    - Bit0.2:DO 018 - WP seat detect alarm 1
      #    - Bit0.3:DO 019 - WP seat detect alarm 2
      - 18184:
          - Bit0.0:DO 101 - Work number search complete
          - Bit0.1:DO 102 - Cycle start permission signal
          - Bit0.2:DO 103 - Machine operating
          - Bit0.3:DO 104 - Machining complete
          - Bit0.4:DO 105 - Robot service code 0
          - Bit0.5:DO 105 - Robot service code 1
          - Bit0.6:DO 105 - Robot service code 2
          - Bit0.7:DO 105 - Robot service code 3
          - Bit1.0:DO 106 - Robot service request
          - Bit1.1:DO 107 - Front/Side door open finished
          - Bit1.2:DO 108 - Front/Side door close finished
          - Bit1.3:DO 109 - Robot access permitted
          - Bit1.4:DO 110 - Front door open finished
          - Bit1.5:DO 111 - Front door close finished
      - 18200:
          - Chars0.32:DO 100 - Current work number
  EIP.Output:
    base_register: 16386
    register_width_bits: 16
    fields:
      - 16386:
          - Bit0.0:DI 000 - Heartbeat
          - Bit0.1:DI 001 - Robot ready
          - Bit0.2:DI 002 - Machine stop request
          - Bit0.3:DI 003 - Robot operating
          - Bit0.4:DI 004 - Robot alarm
          - Bit0.5:DI 005 - Operator interrupt request
          - Bit0.6:DI 006 - Auto power off req
          #- Bit1.0:DI 008 - fix1 clamp command
          #- Bit1.1:DI 009 - fix1 unclamp command
          #- Bit1.2:DI 010 - fix2 clamp command
          #- Bit1.3:DI 011 - fix2 unclamp command
          #- Bit1.4:DI 012 - fix3 clamp command
          #- Bit1.5:DI 013 - fix3 unclamp command
          #- Bit1.6:DI 014 - fix4 clamp command
          #- Bit1.7:DI 015 - fix4 unclamp command
      #- 16387:
      #    - Bit0.0:DI 016 - WP seat detect request 1
      #    - Bit0.1:DI 017 - WP seat detect request 2
      #    - Bit0.2:DI 018 - Ignore WP seat detect alarm 1
      #    - Bit0.3:DI 019 - Ignore WP seat detect alarm 2
      - 16392:
          - Bit0.0:DI 101 - Work number search start
          - Bit0.1:DI 102 - Cycle start command
          - Bit0.2:DI 103 - NC reset
          - Bit0.3:DI 104 - All machining complete
          - Bit0.5:DI 105 - Robot service finished signal
          - Bit0.6:DI 107 - Machine side door open command
          - Bit0.7:DI 108 - Machine side door close command
          - Bit1.0:DI 109 - Robot clear
          - Bit1.1:DI 110 - Machine front door open command
          - Bit1.2:DI 111 - Machine front door close command
      - 16408:
          - Chars0.32:DI 100 - Target work number

